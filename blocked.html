<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Focused - Habitify</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f1e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      background: white;
      border: 3px solid #333;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 42px;
      color: #333;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 18px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    
    .message {
      background: linear-gradient(135deg, #c8bfec 0%, #d9d1f5 100%);
      border: 2px solid #333;
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    
    .message strong {
      color: #333;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎯</div>
    <h1>Stay Focused!</h1>
    <p>This site is blocked during your habit session.</p>
    
    <div class="message">
      <strong>Remember: You're building a habit that matters.</strong>
      <p style="margin-top: 8px; font-size: 14px;">Close this tab and return to your focus website.</p>
    </div>
  </div>
</body>
</html>
